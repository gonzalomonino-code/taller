document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor .2s; }\n  .lg-back:hover { color:#fff; }\n  .lg-call { background:var(--orange); color:#fff; text-decoration:none; font-family:'Barlow Condensed',sans-serif;\n             font-weight:700; font-size:12.5px; letter-spacing:2px; text-transform:uppercase; padding:.55rem 1.1rem; border-radius:4px;\n             display:inline-flex; align-items:center; gap:.45rem; transition:background .2s; }\n  .lg-call:hover { background:var(--orange-dark); }\n  .lg-call svg, .lg-back svg { width:14px; height:14px; }\n\n  /* ---------- HEADER ---------- */\n  .lg-header { background:linear-gradient(180deg,#0b0d12 0%, #141821 100%); color:#fff; padding:3.5rem 2rem 3rem; position:relative; overflow:hidden; }\n  .lg-header:after { content:\"\"; position:absolute; left:0; right:0; bottom:0; height:3px; background:var(--orange); }\n  .lg-header-inner { max-width:1100px; margin:0 auto; }\n  .lg-eyebrow { color:var(--orange); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:5px; text-transform:uppercase; display:flex; align-items:center; gap:.7rem; margin-bottom:.9rem; }\n  .lg-eyebrow:before { content:\"\"; width:26px; height:2px; background:var(--orange); }\n  .lg-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.6rem,6vw,4.2rem); letter-spacing:2px; line-height:.95; }\n  .lg-title span { color:var(--orange); }\n  .lg-updated { color:#9aa0ab; font-size:.9rem; margin-top:1rem; }\n\n  /* ---------- LAYOUT ---------- */\n  .lg-wrap { max-width:1100px; margin:0 auto; padding:3rem 2rem 4rem; display:grid; grid-template-columns:240px 1fr; gap:3rem; align-items:start; }\n\n  /* TOC */\n  .lg-toc { position:sticky; top:84px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:1.4rem 1.3rem; box-shadow:0 2px 14px #0a246310; }\n  .lg-toc-label { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:.9rem; }\n  .l cio<\u002Fspan>\n    <\u002Fa>\n    <a class=\"lg-call\" href=\"tel:699911407\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>\n      Llamar\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HEADER -->\n<header class=\"lg-header\">\n  <div class=\"lg-header-inner\">\n    <p class=\"lg-eyebrow\">Talleres Mateo 2.0<\u002Fp>\n    <h1 class=\"lg-title\">Información <span>Legal<\u002Fspan><\u002Fh1>\n    <p class=\"lg-updated\">Última actualización: junio de 2026<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- DISCLAIMER (visible para el titular durante la puesta en marcha) -->\n<div class=\"lg-disclaimer\">\n  <div>⚠️ <strong>Aviso para el titular:<\u002Fstrong> revisa y completa los campos marcados en <span class=\"ph\">amarillo<\u002Fspan> con tus datos reales (NIF/CIF, denominación fiscal, etc.) y haz validar estos textos por un profesional antes de publicar. Elimina este aviso cuando todo esté revisado.<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"lg-wrap\">\n\n  <!-- TOC -->\n  <nav class=\"lg-toc\" aria-label=\"Índice legal\">\n    <p class=\"lg-toc-label\">Índice<\u002Fp>\n    <a href=\"#aviso-legal\"><span class=\"n\">01<\u002Fspan> Aviso Legal<\u002Fa>\n    <a href=\"#privacidad\"><span class=\"n\">02<\u002Fspan> Política de Privacidad<\u002Fa>\n    <a href=\"#cookies\"><span class=\"n\">03<\u002Fspan> Política de Cookies<\u002Fa>\n    <a href=\"#derechos\"><span class=\"n\">04<\u002Fspan> Ejercicio de Derechos<\u002Fa>\n  <\u002Fnav>\n\n  <main>\n\n    <!-- 01 AVISO LEGAL -->\n    <section class=\"lg-doc\" id=\"aviso-legal\">\n      <span class=\"lg-doc-num\">01<\u002Fspan>\n      <h2>Aviso Legal<\u002Fh2>\n      <p class=\"lead\">En cumplimiento del artículo 10 de la Ley 34/2002, de Servicios de la Sociedad de la Información y de Comercio Electrónico (LSSI-CE), se ponen a disposición de los usuarios los datos identificativos del titular de este sitio web.<\u002Fp>\n\n      <h3>1. Datos del titular<\u002Fh3>\n      <dl class=\"lg-data\">\n        <div><dt>Nombre comercial<\u002Fdt><dd>Talleres Mateo 2.0<\u002Fdd><\u002Fdiv>\n        <div><dt>Titular<\u002Fdt><dd><span class=\"ph\">[Nombre y apellidos / razón social del titular]<\u002Fspan><\u002Fdd><\u002Fdiv>\n        <div><dt>NIF / CIF<\u002Fdt><dd><span class=\"ph\">[NIF/CIF a completar]<\u002Fspan><\u002Fdd><\u002Fdiv>\n        <div><dt>Domicilio<\u002Fdt><dd>C. Concordia, 8 — 30833 Sangonera la Seca, Murcia (España)<\u002Fdd><\u002Fdiv>\n        <div><dt>Teléfono<\u002Fdt><dd><a href=\"tel:699911407\">699 91 14 07<\u002Fa><\u002Fdd><\u002Fdiv>\n        <div><dt>Correo electrónico<\u002Fdt><dd><a href=\"mailto:talleresmateo2.0.oficina@hotmail.com\">talleresmateo2.0.oficina@hotmail.com<\u002Fa><\u002Fdd><\u002Fdiv>\n        <div><dt>Actividad<\u002Fdt><dd>Taller de reparación de vehículos — mecánica y electricidad del automóvil<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n\n      <h3>2. Objeto<\u002Fh3>\n      <p>El presente aviso legal regula el uso del sitio web (en adelante, «el Sitio Web»), cuyo titular es la persona indicada anteriormente. La navegación por el Sitio Web atribuye la condición de usuario e implica la aceptación plena de las presentes condiciones. Si no estás de acuerdo con ellas, te rogamos que no utilices el Sitio Web.<\u002Fp>\n\n      <h3>3. Condiciones de uso<\u002Fh3>\n      <p>El usuario se compromete a hacer un uso adecuado de los contenidos y servicios del Sitio Web y a no emplearlos para:<\u002Fp>\n      <ul>\n        <li>Incurrir en actividades ilícitas, ilegales o contrarias a la buena fe y al orden público.<\u002Fli>\n        <li>Dif   <section class=\"lg-doc\" id=\"privacidad\">\n      <span class=\"lg-doc-num\">02<\u002Fspan>\n      <h2>Política de Privacidad<\u002Fh2>\n      <p class=\"lead\">De conformidad con el Reglamento (UE) 2016/679 (RGPD) y la Ley Orgánica 3/2018 de Protección de Datos Personales y garantía de los derechos digitales (LOPDGDD), te informamos sobre el tratamiento de tus datos personales.<\u002Fp>\n\n      <h3>1. Responsable del tratamiento<\u002Fh3>\n      <dl class=\"lg-data\">\n        <div><dt>Responsable<\u002Fdt><dd>Talleres Mateo 2.0 — <span class=\"ph\">[Titular / NIF a completar]<\u002Fspan><\u002Fdd><\u002Fdiv>\n        <div><dt>Domicilio<\u002Fdt><dd>C. Concordia, 8 — 30833 Sangonera la Seca, Murcia<\u002Fdd><\u002Fdiv>\n        <div><dt>Teléfono<\u002Fdt><dd><a href=\"tel:699911407\">699 91 14 07<\u002Fa><\u002Fdd><\u002Fdiv>\n        <div><dt>Email<\u002Fdt><dd><a href=\"mailto:talleresmateo2.0.oficina@hotmail.com\">talleresmateo2.0.oficina@hotmail.com<\u002Fa><\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n\n      <h3>2. ¿Qué datos tratamos y con qué finalidad?<\u002Fh3>\n      <p>Tratamos los datos que nos facilitas voluntariamente al contactar con nosotros (por teléfono, email o de forma presencial) y los necesarios para prestarte nuestros servicios de taller. Las finalidades son:<\u002Fp>\n      <ul>\n        <li><strong>Atender tus consultas y solicitudes<\u002Fstrong> de información o presupuesto.<\u002Fli>\n        <li><strong>Gestionar la prestación del servicio<\u002Fstrong> de reparación y mantenimiento del vehículo, así como la facturación correspondiente.<\u002Fli>\n        <li><strong>Cumplir las obligaciones legales<\u002Fstrong> (fiscales, contables y de garantía) aplicables a nuestra actividad.<\u002Fli>\n      <\u002Ful>\n      <p>Esta web es fundamentalmente informativa y <strong>no dispone de formularios de registro<\u002Fstrong>; los datos se recogen a través de los canales de contacto indicados.<\u002Fp>\n\n      <h3>3. Legitimación<\u002Fh3>\n      <p>La base jurídica del tratamiento es:<\u002Fp>\n      <ul>\n        <li><strong>Tu consentimiento<\u002Fstrong>, al contactar con nosotros (art. 6.1.a RGPD).<\u002Fli>\n        <li>La <strong>ejecución de un contrato<\u002Fstrong> o de medidas precontractuales a petición tuya (art. 6.1.b RGPD).<\u002Fli>\n        <li>El <strong>cumplimiento de obligaciones legales<\u002Fstrong> aplicables al responsable (art. 6.1.c RGPD).<\u002Fli>\n      <\u002Ful>\n\n      <h3>4. Conservación de los datos<\u002Fh3>\n      <p>Conservaremos tus datos durante el tiempo necesario para atender tu solicitud y, en su caso, mientras dure la relación con el taller. Posteriormente se conservarán bloqueados durante los plazos legalmente exigidos (por ejemplo, los plazos fiscales y de garantía) antes de su supresión definitiva.<\u002Fp>\n\n      <h3>5. Destinatarios<\u002Fh3>\n      <p>Tus datos no se cederán a terceros salvo obligación legal. Podrán acceder a ellos los proveedores de servicios estrictamente necesarios para nuestra actividad (por ejemplo, gestoría o servicios informáticos), que actúan como encargados del tratamiento bajo contrato. No se realizan transferencias internacionales de datos.<\u002Fp>\n\n      <h3>6. Tus derechos<\u002Fh3>\n      <p>Puedes ejercer en cualquier momento los siguientes derechos:<\u002Fp>\n      <ul>\n        <li><strong>Acceso:<\u002Fstrong> conocer qué datos tuyos tratamos.<\u002Fli>\n        <li><strong>Rectificación:<\u002Fstrong> corregir datos inexactos o incompletos.<\u002Fli>\n        <li><strong>Supresión:<\u002Fstrong> solicitar la eliminación de tus datos.<\u002Fli>\n        <li><strong>Oposición:<\u002Fstrong> oponerte a un tratamiento concreto.<\u002Fli>\n        <li><strong>Limitación:<\u002Fstrong> solicitar la limitación del tratamiento.<\u002Fli>\n        <li><strong>Portabilidad:<\u002Fstrong> recibir tus datos en un formato estructurado.<\u002Fli>\n      <\u002Ful>\n      <p>Encontrarás cómo ejercerlos en el apartado <a href=\"#derechos\">Ejercicio de Derechos<\u002Fa>.<\u002Fp>\n\n      <h3>7. Reclamación ante la autoridad de control<\u002Fh3>\n      <p>Si consideras que el tratamiento de tus datos no se ajusta a la normativa, tienes derecho a presentar una reclamación ante la <strong>Agencia Española de Protección de Datos<\u002Fstrong> (AEPD), C/ Jorge Juan, 6, 28001 Madrid — <a href=\"https://www.aepd.es\" target=\"_blank\" rel=\"noopener\">www.aepd.es<\u002Fa>.<\u002Fp>\n\n      <h3>8. Seguridad<\u002Fh3>\n      <p>Aplicamos las medidas técnicas y organizativas razonables para garantizar la seguridad de tus datos y evitar su alteración, pérdida, tratamiento o acceso no autorizado.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- 03 COOKIES -->\n    <section class=\"lg-doc\" id=\"cookies\">\n      <span class=\"lg-doc-num\">03<\u002Fspan>\n      <h2>Política de Cookies<\u002Fh2>\n      <p class=\"lead\">Esta política explica qué son las cookies, cuáles utiliza este Sitio Web y cómo puedes gestionarlas, conforme al artículo 22.2 de la LSSI-CE y a la Guía de cookies de la AEPD.<\u002Fp>\n\n      <h3>1. ¿Qué son las cookies?<\u002Fh3>\n      <p>Una cookie es un pequeño archivo de texto que un sitio web almacena en tu navegador o dispositivo. Sirven, entre otras cosas, para recordar tus preferencias, permitir la navegación y, en su caso, obtener información estadística sobre el uso del sitio.<\u002Fp>\n\n      <h3>2. Tipos de cookies que utilizamos<\u002Fh3>\n      <div class=\"lg-table-wrap\">\n        <table class=\"lg-table\">\n          <thead><tr><th>Cookie / Origen<\u002Fth><th>Tipo<\u002Fth><th>Finalidad<\u002Fth><th>Duración<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr>\n              <td><strong>tmateo_cookie_consent<\u002Fstrong><br>(propia)<\u002Ftd>\n              <td>Técnica / necesaria<\u002Ftd>\n              <td>Guardar tu elección sobre el uso de cookies para no volver a mostrarte el aviso.<\u002Ftd>\n              <td>Persistente<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Google Maps<\u002Fstrong><br>(terceros)<\u002Ftd>\n              <td>Técnica / terceros<\u002Ftd>\n              <td>Mostrar el mapa de ubicación del taller. Google puede instalar cookies propias al cargar el mapa.<\u002Ftd>\n              <td>Según Google<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td><strong>Analíticas<\u002Fstrong><br>(si se activan)<\u002Ftd>\n              <td>Analítica<\u002Ftd>\n              <td>Medir de forma agregada el uso del sitio para mejorarlo. Solo se instalan con tu consentimiento.<\u002Ftd>\n              <td>Según proveedor<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"lg-callout\"><strong>Nota:<\u002Fstrong> esta web no utiliza cookies publicitarias ni de seguimiento de marketing. Las cookies de terceros (Google Maps) se rigen además por las políticas de privacidad de sus proveedores.<\u002Fdiv>\n\n      <h3>3. Gestión de tus preferencias<\u002Fh3>\n      <p>Al acceder por primera vez te mostramos un banner para <strong>aceptar<\u002Fstrong>, <strong>rechazar<\u002Fstrong> o <strong>configurar<\u002Fstrong> las cookies no necesarias. Puedes cambiar tu elección en cualquier momento:<\u002Fp>\n      <p><button class=\"lg-btn orange\" data-cookie-settings=\"\" type=\"button\">⚙️ Configurar cookies<\u002Fbutton><\u002Fp>\n\n      <h3>4. Cómo desactivar las cookies en tu navegador<\u002Fh3>\n      <p>También puedes bloquear o eliminar las cookies desde la configuración de tu navegador:<\u002Fp>\n      <ul>\n        <li><a href=\"https://support.google.com/chrome/answer/95647\" target=\"_blank\" rel=\"noopener\">Google Chrome<\u002Fa><\u002Fli>\n        <li><a href=\"https://support.mozilla.org/es/kb/Borrar%20cookies\" target=\"_blank\" rel=\"noopener\">Mozilla Firefox<\u002Fa><\u002Fli>\n        <li><a href=\"https://support.apple.com/es-es/guide/safari/sfri11471/mac\" target=\"_blank\" rel=\"noopener\">Safari<\u002Fa><\u002Fli>\n        <li><a href=\"https://support.microsoft.com/es-es/microsoft-edge\" target=\"_blank\" rel=\"noopener\">Microsoft Edge<\u002Fa><\u002Fli>\n      <\u002Ful>\n      <p>Ten en cuenta que la desactivación de algunas cookies podría afectar al funcionamiento de ciertas partes del sitio.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- 04 DERECHOS -->\n    <section class=\"lg-doc\" id=\"derechos\">\n      <span class=\"lg-doc-num\">04<\u002Fspan>\n      <h2>Ejercicio de Derechos<\u002Fh2>\n      <p class=\"lead\">Como titular de tus datos personales, la normativa (RGPD y LOPDGDD) te reconoce una serie de derechos que puedes ejercer de forma gratuita.<\u002Fp>\n\n      <h3>1. ¿Qué derechos puedes ejercer?<\u002Fh3>\n      <p>Acceso, rectificación, supresión («derecho al olvido»), oposición, limitación del tratamiento y portabilidad de tus datos. También puedes retirar el consentimiento prestado en cualquier momento, sin que ello afecte a la licitud del tratamiento previo.<\u002Fp>\n\n      <h3>2. ¿Cómo ejercerlos?<\u002Fh3>\n      <p>Para ejercer cualquiera de estos derechos, dirígete a nosotros por uno de estos medios, indicando el derecho que deseas ejercer y adjuntando una copia de tu DNI o documento que acredite tu identidad:<\u002Fp>\n      <dl class=\"lg-data\">\n        <div><dt>Por email<\u002Fdt><dd><a href=\"mailto:talleresmateo2.0.oficina@hotmail.com?subject=Ejercicio%20de%20derechos%20RGPD\">talleresmateo2.0.oficina@hotmail.com<\u002Fa><\u002Fdd><\u002Fdiv>\n        <div><dt>Por correo postal<\u002Fdt><dd>Talleres Mateo 2.0 — C. Concordia, 8, 30833 Sangonera la Seca, Murcia<\u002Fdd><\u002Fdiv>\n        <div><dt>Asunto<\u002Fdt><dd>Indica «Ejercicio de derechos – Protección de datos»<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n      <p>\n        <a class=\"lg-btn orange\" href=\"mailto:talleresmateo2.0.oficina@hotmail.com?subject=Ejercicio%20de%20derechos%20RGPD&amp;body=Deseo%20ejercer%20el%20siguiente%20derecho%3A%20%5Bacceso%2Frectificaci%C3%B3n%2Fsupresi%C3%B3n%2Foposici%C3%B3n%2Flimitaci%C3%B3n%2Fportabilidad%5D.%20Adjunto%20copia%20de%20mi%20documento%20de%20identidad.\">✉️ Enviar solicitud por email<\u002Fa>\n      <\u002Fp>\n\n      <h3>3. Plazo de respuesta<\u002Fh3>\n      <p>Daremos respuesta a tu solicitud en el plazo máximo de <strong>un mes<\u002Fstrong> desde su recepción, prorrogable otros dos meses en caso de solicitudes especialmente complejas, en cuyo caso te informaríamos.<\u002Fp>\n\n      <h3>4. Reclamación ante la AEPD<\u002Fh3>\n      <p>Si entiendes que no hemos atendido correctamente tu solicitud, puedes presentar una reclamación ante la <strong>Agencia Española de Protección de Datos<\u002Fstrong>: <a href=\"https://www.aepd.es\" target=\"_blank\" rel=\"noopener\">www.aepd.es<\u002Fa>.<\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer class=\"lg-foot\">\n  <div class=\"lg-foot-top\">\n    <div>\n      <img src=\"d378a44f-74f0-4c05-b4e5-17fd6289896c\" alt=\"Talleres Mateo 2.0\">\n      <p class=\"lg-foot-tagline\">Mecánica y electricidad de confianza en Sangonera la Seca, Murcia. Tu vehículo en manos expertas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"lg-foot-links\">\n      <a href=\"Landing Mateo Racing.html\">Inicio<\u002Fa>\n      <a href=\"#aviso-legal\">Aviso Legal<\u002Fa>\n      <a href=\"#privacidad\">Política de Privacidad<\u002Fa>\n      <a href=\"#cookies\">Política de Cookies<\u002Fa>\n      <a href=\"#derechos\">Ejercicio de Derechos<\u002Fa>\n      <a data-cookie-settings=\"\" href=\"#\">Configuración de cookies<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"lg-foot-bottom\">\n    <span>© 2026 <span>Talleres Mateo 2.0<\u002Fspan> — C. Concordia, 8 · Sangonera la Seca · Murcia<\u002Fspan>\n    <span>Hecho con precisión 🔧<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"1dda0523-67c8-4204-bd65-d6fb0e007ebc\"><\u002Fscript>\n<script>\n  // TOC active highlight\n  (function () {\n
